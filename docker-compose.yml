services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloud_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cloud_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: cloud_pos
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-webhook-secret}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-secret-token}
      RATE_LIMIT_PER_MINUTE: 100
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
  uploads_data:
