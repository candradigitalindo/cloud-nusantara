# Semua traffic masuk ke pos.nbp.co.id
# /api/v1/* dan /uploads/* → Go app
# /* → Vue SPA

server {
    listen 80;
    server_name pos.nbp.co.id;

    client_max_body_size 200m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Go API — proxy ke backend
    location /api/ {
        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 60s;
        client_body_timeout   300s;
        proxy_request_buffering off;
        proxy_buffering    off;
    }

    # File upload — proxy ke backend
    location /uploads/ {
        proxy_pass       http://app:4000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Hashed assets — cache browser 1 tahun
    location /assets/ {
        root  /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Vue SPA — semua path lain dikembalikan ke index.html
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
