# CORS origin map — tambah origin lain jika perlu
map $http_origin $cors_origin {
    default                  "";
    "https://pos.nbp.co.id"  "https://pos.nbp.co.id";
    "http://pos.nbp.co.id"   "http://pos.nbp.co.id";
}

# ── HTTP — ACME challenge + redirect ke HTTPS ────────────────────────────────
server {
    listen 80;
    server_name pos.nbp.co.id api-pos.nbp.co.id;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Semua traffic lain → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — pos.nbp.co.id (Vue SPA) ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name pos.nbp.co.id;

    ssl_certificate     /etc/letsencrypt/live/pos.nbp.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.nbp.co.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Uploads disimpan di Go backend — proxy transparan
    location /uploads/ {
        proxy_pass       http://app:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── HTTPS — api-pos.nbp.co.id (Go API) ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name api-pos.nbp.co.id;

    ssl_certificate     /etc/letsencrypt/live/api-pos.nbp.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-pos.nbp.co.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        # Tangani preflight CORS di Nginx (tidak diteruskan ke Go)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Outlet-ID, X-Outlet-Code, X-Cloud-Signature' always;
            add_header Access-Control-Max-Age       86400 always;
            return 204;
        }

        # Hapus header CORS dari Go agar tidak duplikat dengan yang kita set di bawah
        proxy_hide_header Access-Control-Allow-Origin;

        proxy_pass         http://app:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;

        # Tambahkan CORS header ke semua response (termasuk error 4xx/5xx)
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization, X-Outlet-ID, X-Outlet-Code, X-Cloud-Signature' always;
    }
}
